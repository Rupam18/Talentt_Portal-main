<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Results API Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .result {
            background: #f5f5f5;
            padding: 10px;
            margin: 10px 0;
            border-radius: 3px;
            white-space: pre-wrap;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #0056b3; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th { background: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Technical Results API Test</h1>
    
    <div class="test-section">
        <h2>Test API Endpoints</h2>
        <button onclick="testGetAllResults()">Test GET /api/technical-test-results/all</button>
        <button onclick="testDatabaseConnection()">Test Database Connection</button>
        <button onclick="showResults()">Show Results Table</button>
    </div>

    <div class="test-section">
        <h2>API Response</h2>
        <div id="apiResult" class="result">Click a test button to see results...</div>
    </div>

    <div class="test-section">
        <h2>Results Table</h2>
        <div id="resultsTable">
            <p>Click "Show Results Table" to display data from technical_test_results table</p>
        </div>
    </div>

    <script>
        async function testGetAllResults() {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.textContent = 'Testing...';
            
            try {
                // Try both ports 8080 and 8081
                let response;
                let port;
                
                try {
                    response = await fetch('http://localhost:8080/api/technical-test-results/all');
                    port = '8080';
                } catch (e) {
                    response = await fetch('http://localhost:8081/api/technical-test-results/all');
                    port = '8081';
                }
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `✅ SUCCESS (Port ${port})\n\nFound ${data.length} technical test results:\n\n${JSON.stringify(data, null, 2)}`;
                    window.latestResults = data;
                } else {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ ERROR\n\n${error.message}\n\nMake sure:\n1. Backend is running on port 8080 or 8081\n2. Database connection is working\n3. technical_test_results table exists`;
            }
        }

        async function testDatabaseConnection() {
            const resultDiv = document.getElementById('apiResult');
            resultDiv.textContent = 'Testing database connection...';
            
            try {
                // This will test if the backend can connect to the database
                let response;
                let port;
                
                try {
                    response = await fetch('http://localhost:8080/api/technical-test-results/all');
                    port = '8080';
                } catch (e) {
                    response = await fetch('http://localhost:8081/api/technical-test-results/all');
                    port = '8081';
                }
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.className = 'result success';
                    resultDiv.textContent = `✅ DATABASE CONNECTION SUCCESSFUL (Port ${port})\n\nBackend is connected to MySQL database\ntable: technical_test_results\nRecords found: ${data.length}\n\nDatabase credentials working:\n- Database: codeverge_db\n- Table: technical_test_results\n- User: riso_user`;
                } else {
                    throw new Error(`Database connection failed: ${response.status}`);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ DATABASE CONNECTION FAILED\n\n${error.message}\n\nTo fix:\n1. Run the SQL script: create_and_test_database.sql\n2. Check MySQL service is running\n3. Verify database credentials\n4. Ensure technical_test_results table exists`;
            }
        }

        function showResults() {
            const tableDiv = document.getElementById('resultsTable');
            
            if (window.latestResults && window.latestResults.length > 0) {
                let html = '<h3>Technical Test Results from Database</h3>';
                html += '<table><thead><tr>';
                html += '<th>ID</th><th>Email</th><th>Name</th><th>Questions</th><th>Correct</th><th>Score %</th><th>Time (s)</th><th>Passed</th><th>Date</th>';
                html += '</tr></thead><tbody>';
                
                window.latestResults.forEach(result => {
                    html += `<tr>
                        <td>${result.id || 'N/A'}</td>
                        <td>${result.candidateEmail || 'N/A'}</td>
                        <td>${result.candidateName || 'N/A'}</td>
                        <td>${result.totalQuestions || 0}</td>
                        <td>${result.totalCorrect || 0}</td>
                        <td>${result.percentageScore || 0}%</td>
                        <td>${result.timeTakenSeconds || 0}</td>
                        <td>${result.passed ? '✅' : '❌'}</td>
                        <td>${result.testDate ? new Date(result.testDate).toLocaleString() : 'N/A'}</td>
                    </tr>`;
                });
                
                html += '</tbody></table>';
                html += `<p><strong>Total Records:</strong> ${window.latestResults.length}</p>`;
                tableDiv.innerHTML = html;
            } else {
                tableDiv.innerHTML = '<p>No results available. Please test the API first.</p>';
            }
        }

        // Auto-test on page load
        window.onload = function() {
            setTimeout(testDatabaseConnection, 1000);
        };
    </script>
</body>
</html>
